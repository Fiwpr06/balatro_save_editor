services:
  - type: web
    name: balatro-save-editor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web:app --bind 0.0.0.0:${PORT:-10000} --workers ${WEB_CONCURRENCY:-1}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
