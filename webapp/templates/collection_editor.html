<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/static/collection-editor/" />
    <title>Balatro Collection & Profile Editor</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="mobile-header">
      <button class="mobile-menu-btn" id="mobile-menu-toggle">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <h1>Collection & Profile Editor</h1>
    </div>

    <div class="container">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h1>Collection & Profile Editor</h1>
          <div style="margin-top: 10px">
            <a class="control-btn" href="/" style="text-decoration: none">
              <i class="fa-solid fa-arrow-left"></i> Back To Run Save Mode
            </a>
          </div>
        </div>

        <div class="search-box">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" id="search-input" placeholder="Search items..." />
        </div>

        <nav class="nav-tabs">
          <button class="nav-tab active" data-category="jokers">
            <span class="icon"><i class="fa-solid fa-theater-masks"></i></span>
            <span>Jokers</span>
          </button>
          <button class="nav-tab" data-category="tarots">
            <span class="icon"
              ><i class="fa-solid fa-star-and-crescent"></i
            ></span>
            <span>Tarots</span>
          </button>
          <button class="nav-tab" data-category="planets">
            <span class="icon"><i class="fa-solid fa-earth-americas"></i></span>
            <span>Planets</span>
          </button>
          <button class="nav-tab" data-category="spectrals">
            <span class="icon"><i class="fa-solid fa-hat-wizard"></i></span>
            <span>Spectrals</span>
          </button>
          <button class="nav-tab" data-category="vouchers">
            <span class="icon"><i class="fa-solid fa-ticket"></i></span>
            <span>Vouchers</span>
          </button>
          <button class="nav-tab" data-category="decks">
            <span class="icon"><i class="fa-solid fa-clone"></i></span>
            <span>Decks</span>
          </button>
          <button class="nav-tab" data-category="modifiers">
            <span class="icon"><i class="fa-solid fa-star"></i></span>
            <span>Card Modifiers</span>
          </button>
          <button class="nav-tab" data-category="tags">
            <span class="icon"><i class="fa-solid fa-tag"></i></span>
            <span>Tags</span>
          </button>
          <button class="nav-tab" data-category="blinds">
            <span class="icon"><i class="fa-solid fa-eye"></i></span>
            <span>Blinds</span>
          </button>
          <button class="nav-tab" data-category="profile">
            <span class="icon"><i class="fa-solid fa-user"></i></span>
            <span>Profile</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="controls-grid">
            <button id="unlock-all" class="control-btn">Unlock All</button>
            <button id="lock-all" class="control-btn">Lock All</button>

            <label for="import-jkr" class="control-btn" style="cursor: pointer">
              <i class="fa-solid fa-upload"></i> Import .jkr
              <input
                type="file"
                id="import-jkr"
                accept=".jkr"
                style="display: none"
              />
            </label>

            <button id="export-jkr" class="control-btn primary">
              <i class="fa-solid fa-download"></i> Export .jkr
            </button>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div id="content-container">
          <div class="loading">Loading data...</div>
        </div>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="js/jkr-converter.js"></script>
    <script src="js/meta.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
